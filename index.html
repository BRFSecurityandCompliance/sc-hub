<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Security & Compliance hub — tools, forms, dashboards and references for the BevChain S&C team." />
<meta name="theme-color" content="#0A1B3D" />
<title>Security &amp; Compliance · Hub</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..700&family=Hanken+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --paper:#F4F6F8; --surface:#FFFFFF; --surface-2:#FBFCFD;
  --ink:#0F141D; --ink-soft:#5A6474; --ink-faint:#909AAA;
  --line:#E3E7ED; --line-soft:#EDEFF3;
  --navy:#0A1B3D; --navy-2:#102A57;
  --accent:#0E9E96; --accent-2:#0B847D; --accent-soft:#E2F4F2; --accent-ring:rgba(14,158,150,.30);
  --ok:#1F9F6B; --warn:#C9852A; --alert:#CF4F4B;
  --shadow-1:0 1px 2px rgba(16,22,34,.04), 0 1px 1px rgba(16,22,34,.03);
  --shadow-2:0 8px 24px rgba(16,22,34,.07), 0 2px 6px rgba(16,22,34,.05);
  --shadow-3:0 24px 60px rgba(10,27,61,.16), 0 8px 18px rgba(10,27,61,.10);
  --grid-line:rgba(15,20,29,.045);
  --r-s:8px; --r-m:14px; --r-l:22px; --maxw:1180px;
  --ease:cubic-bezier(.22,.61,.36,1); --t:.32s var(--ease);
  --font-display:"Bricolage Grotesque","Hanken Grotesk","Noto Sans Thai",system-ui,sans-serif;
  --font-body:"Hanken Grotesk","Noto Sans Thai",system-ui,-apple-system,sans-serif;
  --font-mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
  --font-thai:"Noto Sans Thai","Hanken Grotesk",system-ui,sans-serif;
}
html[data-theme="dark"]{
  --paper:#070C18; --surface:#0E1730; --surface-2:#111B36;
  --ink:#E9EDF6; --ink-soft:#9CA8BE; --ink-faint:#69748B;
  --line:rgba(255,255,255,.085); --line-soft:rgba(255,255,255,.05);
  --navy:#060B17; --navy-2:#0C1730;
  --accent:#22C7BD; --accent-2:#19B0A7; --accent-soft:rgba(34,199,189,.13); --accent-ring:rgba(34,199,189,.34);
  --ok:#34C98A; --warn:#E0A653; --alert:#E8736F;
  --shadow-1:0 1px 2px rgba(0,0,0,.30); --shadow-2:0 10px 30px rgba(0,0,0,.40); --shadow-3:0 26px 64px rgba(0,0,0,.55);
  --grid-line:rgba(255,255,255,.04);
}
html[lang="th"]{ --font-display:var(--font-thai); --font-body:var(--font-thai); }
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
body{font-family:var(--font-body);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;line-height:1.55;font-size:16px;letter-spacing:-0.003em;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::selection{background:var(--accent-soft);color:var(--accent-2)}
:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:4px}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px}
.mono{font-family:var(--font-mono);font-feature-settings:"tnum" 1}
.hidden{display:none !important}

.nav{position:sticky;top:0;z-index:60;background:color-mix(in srgb,var(--paper) 78%,transparent);
  backdrop-filter:saturate(1.6) blur(18px);-webkit-backdrop-filter:saturate(1.6) blur(18px);
  border-bottom:1px solid transparent;transition:border-color var(--t),background var(--t)}
.nav.scrolled{border-bottom-color:var(--line);background:color-mix(in srgb,var(--paper) 90%,transparent)}
.nav-inner{display:flex;align-items:center;gap:18px;height:62px;max-width:var(--maxw);margin:0 auto;padding:0 28px}
.brand{display:flex;align-items:center;gap:11px;font-weight:600;letter-spacing:-0.02em;font-size:15px;white-space:nowrap}
.brand .mark{width:30px;height:30px;border-radius:9px;background:var(--navy);display:grid;place-items:center;flex:0 0 auto;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06)}
.brand .mark svg{width:17px;height:17px;color:var(--accent)}
html[data-theme="dark"] .brand .mark{background:var(--surface-2)}
.brand small{display:block;font-family:var(--font-mono);font-size:9.5px;letter-spacing:.16em;color:var(--ink-faint);font-weight:500;margin-top:1px;text-transform:uppercase}
.nav-spacer{flex:1}
.nav-links{display:flex;align-items:center;gap:2px}
.nav-links a{font-size:13.5px;color:var(--ink-soft);padding:7px 12px;border-radius:8px;font-weight:500;transition:color var(--t),background var(--t)}
.nav-links a:hover{color:var(--ink);background:var(--line-soft)}
.nav-search-btn{display:inline-flex;align-items:center;gap:9px;height:36px;padding:0 11px 0 12px;border-radius:9px;border:1px solid var(--line);background:var(--surface);color:var(--ink-faint);font-size:13px;transition:border-color var(--t),box-shadow var(--t);min-width:180px}
.nav-search-btn:hover{border-color:var(--accent-ring);box-shadow:0 0 0 3px var(--accent-soft)}
.nav-search-btn svg{width:15px;height:15px}
.nav-search-btn .kbd{margin-left:auto;font-family:var(--font-mono);font-size:10.5px;padding:2px 6px;border-radius:5px;background:var(--line-soft);color:var(--ink-soft);border:1px solid var(--line)}
.icon-btn{width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:var(--surface);display:grid;place-items:center;color:var(--ink-soft);transition:color var(--t),border-color var(--t),background var(--t)}
.icon-btn:hover{color:var(--ink);border-color:var(--accent-ring)}
.icon-btn svg{width:16px;height:16px}
.lang-btn{font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:.04em;width:auto;padding:0 11px;gap:5px}
.admin-link{display:inline-flex;align-items:center;gap:7px;height:36px;padding:0 14px;border-radius:9px;background:var(--navy);color:#fff;font-size:13px;font-weight:500;transition:transform var(--t),box-shadow var(--t)}
.admin-link svg{width:14px;height:14px;color:var(--accent)}
.admin-link:hover{box-shadow:var(--shadow-2);transform:translateY(-1px)}
.nav-burger{display:none}

.hero{position:relative;padding:88px 0 64px;overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
  background-size:46px 46px;background-position:center top;
  -webkit-mask-image:radial-gradient(120% 80% at 50% 0%,#000 30%,transparent 78%);mask-image:radial-gradient(120% 80% at 50% 0%,#000 30%,transparent 78%)}
.hero-glow{position:absolute;z-index:0;top:-180px;left:50%;transform:translateX(-50%);width:780px;height:420px;background:radial-gradient(circle,var(--accent-soft),transparent 66%);opacity:.85;pointer-events:none;filter:blur(4px)}
.hero-inner{position:relative;z-index:1;max-width:920px}
.eyebrow{display:inline-flex;align-items:center;gap:9px;font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);font-weight:500;padding:6px 12px 6px 11px;border:1px solid var(--line);border-radius:100px;background:var(--surface);box-shadow:var(--shadow-1)}
.eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 3px color-mix(in srgb,var(--ok) 22%,transparent);animation:pulse 2.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
h1.hero-title{font-family:var(--font-display);font-weight:380;font-size:clamp(2.5rem,6.4vw,5rem);line-height:1.02;letter-spacing:-0.035em;margin:26px 0 0;max-width:16ch}
html[lang="th"] h1.hero-title{font-weight:600;letter-spacing:-0.01em;line-height:1.18;max-width:24ch;font-size:clamp(2rem,5.2vw,3.6rem)}
.hero-sub{font-size:clamp(1.02rem,1.6vw,1.22rem);color:var(--ink-soft);max-width:60ch;margin-top:22px;line-height:1.55;font-weight:400}
.hero-search{margin-top:34px;max-width:600px}
.hero-search button{width:100%;display:flex;align-items:center;gap:14px;height:60px;padding:0 18px;border-radius:16px;background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow-2);color:var(--ink-faint);font-size:16px;transition:border-color var(--t),box-shadow var(--t),transform var(--t)}
.hero-search button:hover{border-color:var(--accent-ring);box-shadow:0 0 0 4px var(--accent-soft),var(--shadow-2);transform:translateY(-1px)}
.hero-search svg{width:20px;height:20px;color:var(--accent)}
.hero-search .kbd{margin-left:auto;font-family:var(--font-mono);font-size:11px;padding:4px 8px;border-radius:6px;background:var(--line-soft);border:1px solid var(--line);color:var(--ink-soft)}
.statusline{margin-top:26px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-family:var(--font-mono);font-size:12px;color:var(--ink-soft)}
.statusline .sep{color:var(--ink-faint);opacity:.6}
.statusline b{color:var(--ink);font-weight:600}
.statusline .live{display:inline-flex;align-items:center;gap:7px}
.statusline .live .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 3px color-mix(in srgb,var(--ok) 20%,transparent);animation:pulse 2.6s ease-in-out infinite}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-top:54px;border:1px solid var(--line);border-radius:var(--r-l);background:var(--surface);overflow:hidden;box-shadow:var(--shadow-1)}
.stat{padding:26px 28px;border-right:1px solid var(--line)}
.stat:last-child{border-right:none}
.stat .k{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:500}
.stat .v{font-family:var(--font-display);font-size:2.4rem;font-weight:440;letter-spacing:-0.03em;margin-top:8px;line-height:1}
.stat .v.sm{font-size:1.5rem;font-weight:500;letter-spacing:-0.02em}
.stat .meta{font-size:12.5px;color:var(--ink-soft);margin-top:6px}

section.block{padding:70px 0 0}
section.block.last{padding-bottom:96px}
.sec-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:30px;flex-wrap:wrap}
.sec-eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-2);font-weight:600}
.sec-title{font-family:var(--font-display);font-size:clamp(1.6rem,3vw,2.3rem);font-weight:440;letter-spacing:-0.025em;margin-top:10px;line-height:1.1}
html[lang="th"] .sec-title{font-weight:600;letter-spacing:-0.005em}
.sec-desc{color:var(--ink-soft);font-size:14.5px;margin-top:8px;max-width:62ch}
.sec-count{font-family:var(--font-mono);font-size:12px;color:var(--ink-faint);white-space:nowrap;padding-bottom:4px}

.quick-row{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(258px,1fr);gap:14px;overflow-x:auto;padding:4px 4px 14px;scroll-snap-type:x proximity;margin:0 -4px}
.quick-row::-webkit-scrollbar{height:8px}
.quick-row::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
.quick-card{scroll-snap-align:start;border:1px solid var(--line);border-radius:var(--r-m);background:var(--surface);padding:18px;display:flex;flex-direction:column;gap:12px;transition:border-color var(--t),box-shadow var(--t),transform var(--t);position:relative;overflow:hidden;text-align:left}
.quick-card:hover{border-color:var(--accent-ring);box-shadow:var(--shadow-2);transform:translateY(-2px)}
.quick-card .rank{font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);font-weight:500}
.quick-card .qt{font-weight:600;font-size:15px;letter-spacing:-0.01em;line-height:1.25}
.quick-card .qmeta{display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);margin-top:auto}
.quick-card .qmeta .cat{display:inline-flex;align-items:center;gap:6px}
.quick-card .qmeta .cat svg{width:13px;height:13px;color:var(--accent-2)}
.quick-card .qmeta .clicks{margin-left:auto;color:var(--ink-faint)}

.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.res-card{position:relative;border:1px solid var(--line);border-radius:var(--r-m);background:var(--surface);padding:20px 20px 18px;display:flex;flex-direction:column;gap:11px;min-height:148px;transition:border-color var(--t),box-shadow var(--t),transform var(--t);cursor:pointer;overflow:hidden}
.res-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);transform:scaleY(0);transform-origin:top;transition:transform var(--t)}
.res-card:hover{border-color:var(--accent-ring);box-shadow:var(--shadow-2);transform:translateY(-3px)}
.res-card:hover::before{transform:scaleY(1)}
.res-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.res-type{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;color:var(--ink-soft);padding:4px 8px;border:1px solid var(--line);border-radius:6px;background:var(--surface-2);white-space:nowrap}
.res-arrow{width:30px;height:30px;border-radius:8px;background:var(--surface-2);display:grid;place-items:center;color:var(--ink-faint);transition:background var(--t),color var(--t),transform var(--t);flex:0 0 auto}
.res-card:hover .res-arrow{background:var(--accent);color:#fff;transform:translate(2px,-2px)}
.res-arrow svg{width:14px;height:14px}
.res-title{font-weight:600;font-size:16px;letter-spacing:-0.012em;line-height:1.25}
.res-title-th{font-family:var(--font-thai);font-size:12.5px;color:var(--ink-faint);font-weight:400;margin-top:1px}
html[lang="th"] .res-title-th{display:none}
.res-desc{font-size:13.5px;color:var(--ink-soft);line-height:1.5;flex:1}
.res-foot{display:flex;align-items:center;gap:10px;font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);margin-top:2px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:100px}
.badge .d{width:6px;height:6px;border-radius:50%;background:currentColor}
.badge.active{color:var(--ok);background:color-mix(in srgb,var(--ok) 12%,transparent)}
.badge.maintenance{color:var(--warn);background:color-mix(in srgb,var(--warn) 14%,transparent)}
.badge.new{color:var(--accent-2);background:var(--accent-soft)}
.badge.pin{color:var(--ink-soft);background:var(--line-soft)}
.badge.pin svg{width:11px;height:11px}
.res-host{margin-left:auto;color:var(--ink-faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px}

footer{background:var(--navy);color:#cdd6e6;margin-top:90px;position:relative;overflow:hidden}
html[data-theme="dark"] footer{border-top:1px solid var(--line)}
.foot-grid{display:grid;grid-template-columns:1.6fr 1fr 1fr;gap:40px;padding:64px 0 0}
.foot-brand .mark{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.06);display:grid;place-items:center;margin-bottom:18px}
.foot-brand .mark svg{width:21px;height:21px;color:var(--accent)}
.foot-brand h3{font-family:var(--font-display);font-weight:460;font-size:1.5rem;letter-spacing:-0.02em;color:#fff;margin-bottom:10px}
.foot-brand p{font-size:13.5px;color:#9fabc4;max-width:42ch;line-height:1.6}
.foot-col h4{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;color:#6c7a96;margin-bottom:16px;font-weight:500}
.foot-col a,.foot-col button{display:flex;align-items:center;gap:8px;font-size:13.5px;color:#cdd6e6;padding:6px 0;transition:color var(--t);text-align:left;width:100%}
.foot-col a:hover,.foot-col button:hover{color:var(--accent)}
.foot-col svg{width:14px;height:14px;opacity:.7}
.foot-bottom{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:28px 0;margin-top:50px;border-top:1px solid rgba(255,255,255,.08);flex-wrap:wrap}
.foot-bottom .meta{font-family:var(--font-mono);font-size:11.5px;color:#7e8aa4;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.foot-bottom .meta .sep{opacity:.4}

.overlay{position:fixed;inset:0;z-index:90;display:none}
.overlay.open{display:block}
.overlay .scrim{position:absolute;inset:0;background:color-mix(in srgb,var(--navy) 40%,transparent);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);animation:fade .2s ease}
.palette{position:relative;max-width:620px;margin:11vh auto 0;background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow-3);overflow:hidden;animation:rise .26s var(--ease)}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes rise{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
.pal-input{display:flex;align-items:center;gap:13px;padding:18px 20px;border-bottom:1px solid var(--line)}
.pal-input svg{width:19px;height:19px;color:var(--accent);flex:0 0 auto}
.pal-input input{flex:1;border:none;background:none;font-family:var(--font-body);font-size:17px;color:var(--ink);letter-spacing:-0.01em}
.pal-input input:focus{outline:none}
.pal-input .esc{font-family:var(--font-mono);font-size:11px;padding:3px 8px;border-radius:6px;background:var(--line-soft);border:1px solid var(--line);color:var(--ink-soft)}
.pal-results{max-height:54vh;overflow-y:auto;padding:8px}
.pal-group{padding:14px 12px 6px}
.pal-group .gl{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
.pal-item{display:flex;align-items:center;gap:13px;padding:11px 12px;border-radius:11px;cursor:pointer;transition:background var(--t)}
.pal-item.sel,.pal-item:hover{background:var(--accent-soft)}
.pal-item .pic{width:34px;height:34px;border-radius:9px;background:var(--surface-2);display:grid;place-items:center;color:var(--accent-2);flex:0 0 auto;border:1px solid var(--line)}
.pal-item.sel .pic{background:var(--accent);color:#fff;border-color:transparent}
.pal-item .pic svg{width:16px;height:16px}
.pal-item .pi-t{font-weight:600;font-size:14.5px;letter-spacing:-0.01em}
.pal-item .pi-s{font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);margin-top:1px}
.pal-item .pi-go{margin-left:auto;font-family:var(--font-mono);font-size:10.5px;color:var(--ink-faint);opacity:0;transition:opacity var(--t)}
.pal-item.sel .pi-go{opacity:1}
.pal-empty{padding:48px 20px;text-align:center;color:var(--ink-faint);font-size:14px}
.pal-empty .mono{display:block;margin-top:6px;font-size:12px}
.pal-foot{display:flex;align-items:center;gap:18px;padding:11px 18px;border-top:1px solid var(--line);font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);background:var(--surface-2)}
.pal-foot kbd{font-family:var(--font-mono);background:var(--surface);border:1px solid var(--line);border-radius:5px;padding:2px 6px;color:var(--ink-soft)}

.toasts{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:120;display:flex;flex-direction:column;gap:10px;align-items:center}
.toast{display:flex;align-items:center;gap:11px;background:var(--navy);color:#fff;padding:13px 18px;border-radius:12px;font-size:13.5px;box-shadow:var(--shadow-3);animation:rise .3s var(--ease);max-width:90vw}
.toast svg{width:16px;height:16px;color:var(--accent);flex:0 0 auto}

.admin-top{position:sticky;top:0;z-index:40;background:color-mix(in srgb,var(--paper) 88%,transparent);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
.admin-top-inner{display:flex;align-items:center;gap:16px;height:64px;max-width:1240px;margin:0 auto;padding:0 28px}
.admin-badge{display:inline-flex;align-items:center;gap:9px;font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent-2);font-weight:600;padding:6px 11px;border:1px solid var(--accent-ring);border-radius:8px;background:var(--accent-soft)}
.admin-badge svg{width:14px;height:14px}
.admin-wrap{max-width:1240px;margin:0 auto;padding:30px 28px 80px}
.admin-tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:28px;flex-wrap:wrap}
.admin-tab{font-size:14px;font-weight:500;color:var(--ink-soft);padding:12px 16px;border-bottom:2px solid transparent;transition:color var(--t),border-color var(--t);margin-bottom:-1px;display:inline-flex;align-items:center;gap:8px}
.admin-tab svg{width:15px;height:15px}
.admin-tab:hover{color:var(--ink)}
.admin-tab.active{color:var(--accent-2);border-bottom-color:var(--accent)}
.panel-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.panel-head h2{font-family:var(--font-display);font-size:1.5rem;font-weight:480;letter-spacing:-0.02em}
.panel-head p{font-size:13.5px;color:var(--ink-soft);margin-top:4px}
.btn{display:inline-flex;align-items:center;gap:8px;height:40px;padding:0 16px;border-radius:10px;font-size:13.5px;font-weight:500;transition:transform var(--t),box-shadow var(--t),background var(--t),border-color var(--t);border:1px solid var(--line);background:var(--surface);color:var(--ink)}
.btn svg{width:15px;height:15px}
.btn:hover{border-color:var(--accent-ring)}
.btn.primary{background:var(--navy);color:#fff;border-color:transparent}
.btn.primary svg{color:var(--accent)}
.btn.primary:hover{box-shadow:var(--shadow-2);transform:translateY(-1px)}
.btn.ghost{background:transparent}
.btn.danger{color:var(--alert);border-color:color-mix(in srgb,var(--alert) 30%,transparent)}
.btn.danger:hover{background:color-mix(in srgb,var(--alert) 10%,transparent)}
.btn.sm{height:32px;padding:0 10px;font-size:12.5px;border-radius:8px}
.tbl{border:1px solid var(--line);border-radius:var(--r-m);overflow:hidden;background:var(--surface)}
.trow{display:grid;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid var(--line-soft);transition:background var(--t)}
.trow:last-child{border-bottom:none}
.trow:hover{background:var(--surface-2)}
.trow.head{background:var(--surface-2);font-family:var(--font-mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
.trow.head:hover{background:var(--surface-2)}
.res-row{grid-template-columns:30px 1fr 110px 96px 56px auto}
.cat-row{grid-template-columns:36px 1fr 70px 110px auto}
.t-icon{width:32px;height:32px;border-radius:9px;background:var(--surface-2);display:grid;place-items:center;color:var(--accent-2);border:1px solid var(--line)}
.t-icon svg{width:16px;height:16px}
.t-name{font-weight:600;font-size:14px;letter-spacing:-0.01em}
.t-sub{font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-pill{font-family:var(--font-mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);border:1px solid var(--line);border-radius:6px;padding:3px 7px;background:var(--surface-2);text-align:center;font-weight:600}
.t-actions{display:flex;gap:5px;justify-content:flex-end}
.mini{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--surface);display:grid;place-items:center;color:var(--ink-soft);transition:color var(--t),border-color var(--t),background var(--t)}
.mini:hover{color:var(--ink);border-color:var(--accent-ring)}
.mini.del:hover{color:var(--alert);border-color:color-mix(in srgb,var(--alert) 30%,transparent)}
.mini svg{width:14px;height:14px}
.mini[disabled]{opacity:.35;cursor:not-allowed}
.cardbox{border:1px solid var(--line);border-radius:var(--r-m);background:var(--surface);padding:24px}
.cardbox+.cardbox{margin-top:18px}
.cardbox h3{font-size:15px;font-weight:600;letter-spacing:-0.01em;margin-bottom:4px}
.cardbox .hint{font-size:13px;color:var(--ink-soft);margin-bottom:18px}
.field{margin-bottom:16px}
.field label{display:block;font-family:var(--font-mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin-bottom:7px}
.field input,.field textarea,.field select{width:100%;height:42px;padding:0 13px;border:1px solid var(--line);border-radius:10px;background:var(--surface-2);color:var(--ink);font-family:var(--font-body);font-size:14px;transition:border-color var(--t),box-shadow var(--t)}
.field textarea{height:auto;padding:11px 13px;resize:vertical;min-height:64px;line-height:1.5}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);background:var(--surface)}
.field input::placeholder,.field textarea::placeholder{color:var(--ink-faint)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.formgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.modal-overlay{position:fixed;inset:0;z-index:100;display:none}
.modal-overlay.open{display:block}
.modal-overlay .scrim{position:absolute;inset:0;background:color-mix(in srgb,var(--navy) 45%,transparent);backdrop-filter:blur(5px);animation:fade .2s ease}
.modal{position:relative;max-width:680px;margin:7vh auto 0;background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow-3);max-height:84vh;display:flex;flex-direction:column;animation:rise .26s var(--ease)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:22px 24px;border-bottom:1px solid var(--line)}
.modal-head h3{font-family:var(--font-display);font-size:1.25rem;font-weight:480;letter-spacing:-0.015em}
.modal-body{padding:24px;overflow-y:auto}
.modal-foot{display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:18px 24px;border-top:1px solid var(--line);background:var(--surface-2)}
.iconpick{display:grid;grid-template-columns:repeat(8,1fr);gap:7px}
.iconpick button{height:42px;border-radius:9px;border:1px solid var(--line);background:var(--surface-2);display:grid;place-items:center;color:var(--ink-soft);transition:all var(--t)}
.iconpick button svg{width:18px;height:18px}
.iconpick button:hover{border-color:var(--accent-ring);color:var(--ink)}
.iconpick button.on{background:var(--accent);color:#fff;border-color:transparent}
.login-screen{min-height:100vh;display:grid;place-items:center;padding:24px;position:relative;overflow:hidden}
.login-bg{position:absolute;inset:0;background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);background-size:46px 46px;-webkit-mask-image:radial-gradient(80% 60% at 50% 40%,#000,transparent 75%);mask-image:radial-gradient(80% 60% at 50% 40%,#000,transparent 75%)}
.login-card{position:relative;width:100%;max-width:400px;background:var(--surface);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow-3);padding:36px 32px;text-align:center}
.login-card .lmark{width:54px;height:54px;border-radius:15px;background:var(--navy);display:grid;place-items:center;margin:0 auto 20px}
.login-card .lmark svg{width:26px;height:26px;color:var(--accent)}
.login-card h2{font-family:var(--font-display);font-size:1.5rem;font-weight:480;letter-spacing:-0.02em;margin-bottom:6px}
.login-card p{font-size:13.5px;color:var(--ink-soft);margin-bottom:24px}
.login-card .field{text-align:left}
.login-card input{height:46px;text-align:center;font-family:var(--font-mono);letter-spacing:.05em}
.login-card .btn{width:100%;justify-content:center;height:46px;margin-top:4px}
.login-card .err{color:var(--alert);font-size:13px;font-family:var(--font-mono);margin-top:14px;min-height:18px}
.login-card .hint-box{margin-top:22px;padding:13px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;font-family:var(--font-mono);font-size:11.5px;color:var(--ink-soft);line-height:1.6}
.login-card .hint-box b{color:var(--ink)}
.login-back{position:absolute;top:24px;left:24px;display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-soft);padding:8px 12px;border-radius:9px;transition:color var(--t),background var(--t)}
.login-back:hover{color:var(--ink);background:var(--line-soft)}
.login-back svg{width:15px;height:15px}
.an-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px}
.an-stat{border:1px solid var(--line);border-radius:var(--r-m);background:var(--surface);padding:20px}
.an-stat .k{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
.an-stat .v{font-family:var(--font-display);font-size:2.1rem;font-weight:460;letter-spacing:-0.02em;margin-top:8px}
.bar-row{display:grid;grid-template-columns:1fr 60px;align-items:center;gap:14px;padding:11px 0;border-bottom:1px solid var(--line-soft)}
.bar-row:last-child{border-bottom:none}
.bar-label{font-size:13.5px;font-weight:500;display:flex;align-items:center;gap:9px;min-width:0}
.bar-label svg{width:14px;height:14px;color:var(--accent-2);flex:0 0 auto}
.bar-label span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{height:7px;border-radius:100px;background:var(--line-soft);margin-top:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:100px;background:var(--accent);transition:width .6s var(--ease)}
.bar-val{font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);text-align:right;font-weight:500}
.empty-state{text-align:center;padding:60px 20px;color:var(--ink-faint)}
.empty-state svg{width:34px;height:34px;margin-bottom:14px;opacity:.5}
.empty-state p{font-size:14px}
.reveal{opacity:0;transform:translateY(18px);transition:opacity .6s var(--ease),transform .6s var(--ease)}
.reveal.in{opacity:1;transform:none}
@media (prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}*,*::before,*::after{animation-duration:.001ms !important;transition-duration:.001ms !important}}
@media (max-width:860px){
  .nav-links,.nav-search-btn{display:none}
  .nav-burger{display:grid}
  .foot-grid{grid-template-columns:1fr;gap:34px}
  .formgrid{grid-template-columns:1fr}
  .an-grid{grid-template-columns:1fr}
  .res-row{grid-template-columns:30px 1fr 70px auto}
  .res-row .col-status,.res-row .col-pin{display:none}
  .cat-row{grid-template-columns:36px 1fr auto}
  .cat-row .col-count{display:none}
}
@media (max-width:560px){
  .wrap{padding:0 18px}
  .stats{grid-template-columns:1fr}
  .stat{border-right:none;border-bottom:1px solid var(--line)}
  .stat:last-child{border-bottom:none}
  .hero{padding:54px 0 44px}
  .admin-wrap,.admin-top-inner{padding-left:18px;padding-right:18px}
  .iconpick{grid-template-columns:repeat(6,1fr)}
  .palette{margin:6vh 14px 0}
}
</style>
</head>

function saveRes(){
  var en=$("#rf-ten").value.trim(); if(!en){ $("#rf-ten").focus(); return; }
  var data={ title:{en:en, th:$("#rf-tth").value.trim()||en}, url:$("#rf-url").value.trim()||"#",
    desc:{en:$("#rf-den").value.trim(), th:$("#rf-dth").value.trim()||$("#rf-den").value.trim()},
    categoryId:$("#rf-cat").value, type:$("#rf-type").value, status:$("#rf-status").value, pinned:$("#rf-pin").checked };
  if(editingRes){ var r=state.resources.find(function(x){return x.id===editingRes;}); Object.assign(r,data); }
  else { var max=Math.max(-1,...resOf(data.categoryId).map(function(x){return x.order;})); data.id=uid("r"); data.order=max+1; state.resources.push(data); }
  touch(); closeModal(); renderPanel(); toast(t("saved"));
}
function deleteRes(id){ if(!confirm(t("del_confirm"))) return; state.resources=state.resources.filter(function(r){return r.id!==id;}); delete state.analytics[id]; touch(); renderPanel(); toast(t("deleted"),"trash"); }

function saveCat(){
  var en=$("#cf-nen").value.trim(); if(!en){ $("#cf-nen").focus(); return; }
  var data={ name:{en:en, th:$("#cf-nth").value.trim()||en}, desc:{en:$("#cf-den").value.trim(), th:$("#cf-dth").value.trim()||$("#cf-den").value.trim()}, icon:pickedIcon };
  if(editingCat){ var c=state.categories.find(function(x){return x.id===editingCat;}); Object.assign(c,data); }
  else { data.id=uid("c"); data.order=state.categories.length; state.categories.push(data); }
  touch(); closeModal(); renderPanel(); toast(t("saved"));

function deleteCat(id){
  var n=resOf(id).length;
  var msg = n>0 ? (t("del_confirm")+" ("+n+" "+t("cat_count_many")+")") : t("del_confirm");
  if(!confirm(msg)) return;
  state.resources=state.resources.filter(function(r){return r.categoryId!==id;});
  state.categories=state.categories.filter(function(c){return c.id!==id;});
  reflow(); touch(); renderPanel(); toast(t("deleted"),"trash");
}
function moveCat(id,d){ var cats=sortedCats(); var i=cats.findIndex(function(x){return x.id===id;}); var j=i+d; if(j<0||j>=cats.length) return; var a=cats[i],b=cats[j]; var o=a.order; a.order=b.order; b.order=o; touch(); renderPanel(); }

function saveBrand(){
  var s=state.settings;
  s.departmentName={en:$("#set-dept-en").value.trim(),th:$("#set-dept-th").value.trim()};
  s.org={en:$("#set-org-en").value.trim(),th:$("#set-org-th").value.trim()};
  s.headline={en:$("#set-head-en").value.trim(),th:$("#set-head-th").value.trim()};

function savePwd(){ var v=$("#set-pwd").value; if(!v){ return; } state.settings.adminPasswordHash=hashStr(v); $("#set-pwd").value=""; touch(); toast(t("pwd_changed"),"lock"); }

function doExport(){
  var blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  var url=URL.createObjectURL(blob); var a=document.createElement("a");
  a.href=url; a.download="sc-hub-data-"+new Date().toISOString().slice(0,10)+".json"; a.click();
  setTimeout(function(){URL.revokeObjectURL(url);},500); toast(t("exported"),"download");
}
function doImport(){ var f=$("#import-file"); if(f) f.click(); }
function handleImport(file){
  var rd=new FileReader();
  rd.onload=function(){ try{ var d=JSON.parse(rd.result); if(d&&d.settings&&d.categories&&d.resources){ state=d; if(!state.analytics)state.analytics={}; persist(); adminTab="resources"; renderAll(); toast(t("imported"),"upload"); } else { alert("Invalid file"); } }catch(e){ alert("Could not read file"); } };
  rd.readAsText(file);
}
function doReset(){ if(!confirm(t("reset_confirm"))) return; state=deep(DEFAULTS); state.settings.adminPasswordHash=hashStr(DEFAULT_PWD); state.settings.updatedAt=Date.now(); persist(); adminTab="resources"; renderAll(); toast(t("saved")); }

function doRequest(){
  var what=prompt(t("request_prompt")); if(!what) return;
  var mail="mailto:"+encodeURIComponent(state.settings.contactEmail)+"?subject="+encodeURIComponent("[S&C Hub] Resource request")+"&body="+encodeURIComponent(what);
  window.location.href=mail;
}
/* ===================== ROUTER + RENDER ===================== */
var currentView=null;
function renderHub(){ renderHubChrome(); renderHubMain(); }
function renderAll(){ renderHubChrome(); renderHubMain(); paintIcons(); if(currentView==="admin"){ renderAdmin(); } }
function route(){
  var h=location.hash||"";
  var target = h.indexOf("#admin")===0 ? "admin" : "hub";
  if(target==="admin"){
    if(currentView!=="admin"){ currentView="admin"; $("#hub-view").classList.add("hidden"); $("#admin-view").classList.remove("hidden"); window.scrollTo(0,0); }
    renderAdmin();
  } else {
    if(currentView!=="hub"){ currentView="hub"; $("#admin-view").classList.add("hidden"); $("#hub-view").classList.remove("hidden"); renderHub(); }
    if(h.indexOf("#cat-")===0){ setTimeout(function(){ var el=document.querySelector(h); if(el) el.scrollIntoView({behavior:"smooth",block:"start"}); },60); }
  }
}

/* ===================== EVENTS ===================== */
function dispatch(act,el){
  switch(act){
    case "open-search": openSearch(); break;
    case "close-search": closeSearch(); break;
    case "toggle-lang": toggleLang(); break;
    case "toggle-theme": toggleTheme(); if(currentView==="admin") renderAdmin(); break;
    case "export": doExport(); break;
    case "import": doImport(); break;
    case "reset": doReset(); break;
    case "request": doRequest(); break;
    case "login": tryLogin(); break;
    case "add-res": openResForm(null); break;
    case "add-cat": openCatForm(null); break;
    case "save-res": saveRes(); break;
    case "save-cat": saveCat(); break;
    case "save-brand": saveBrand(); break;
    case "save-pwd": savePwd(); break;
    case "close-modal": closeModal(); break;
  }
}
document.addEventListener("click",function(e){
  var a=e.target.closest("[data-act]"); if(a){ e.preventDefault(); dispatch(a.getAttribute("data-act"),a); return; }
  var open=e.target.closest("[data-open]"); if(open){ openResource(open.getAttribute("data-open")); return; }
  var po=e.target.closest("[data-palopen]"); if(po){ var id=po.getAttribute("data-palopen"); closeSearch(); openResource(id); return; }
  var tab=e.target.closest("[data-tab]"); if(tab){ adminTab=tab.getAttribute("data-tab"); renderAdmin(); return; }
  var er=e.target.closest("[data-editres]"); if(er){ openResForm(er.getAttribute("data-editres")); return; }
  var dr=e.target.closest("[data-delres]"); if(dr){ deleteRes(dr.getAttribute("data-delres")); return; }
  var mru=e.target.closest("[data-moveres-up]"); if(mru){ moveRes(mru.getAttribute("data-moveres-up"),-1); return; }
  var mrd=e.target.closest("[data-moveres-down]"); if(mrd){ moveRes(mrd.getAttribute("data-moveres-down"),1); return; }
  var pn=e.target.closest("[data-pin]"); if(pn){ togglePin(pn.getAttribute("data-pin")); return; }
  var ec=e.target.closest("[data-editcat]"); if(ec){ openCatForm(ec.getAttribute("data-editcat")); return; }
  var dc=e.target.closest("[data-delcat]"); if(dc){ deleteCat(dc.getAttribute("data-delcat")); return; }
  var mcu=e.target.closest("[data-movecat-up]"); if(mcu){ moveCat(mcu.getAttribute("data-movecat-up"),-1); return; }
  var mcd=e.target.closest("[data-movecat-down]"); if(mcd){ moveCat(mcd.getAttribute("data-movecat-down"),1); return; }
  var ip=e.target.closest("[data-icon]"); if(ip){ pickedIcon=ip.getAttribute("data-icon"); var box=document.getElementById("icon-pick"); if(box){ Array.prototype.forEach.call(box.children,function(b){ b.classList.toggle("on", b.getAttribute("data-icon")===pickedIcon); }); } return; }
});
document.addEventListener("change",function(e){ if(e.target&&e.target.id==="import-file"&&e.target.files&&e.target.files[0]){ handleImport(e.target.files[0]); } });
document.addEventListener("keydown",function(e){
  var palOpen=$("#palette-overlay").classList.contains("open");
  var modalOpen=$("#modal-overlay").classList.contains("open");
  var typing=/^(INPUT|TEXTAREA|SELECT)$/.test((e.target&&e.target.tagName)||"");
  if((e.metaKey||e.ctrlKey)&&(e.key==="k"||e.key==="K")){ e.preventDefault(); if(palOpen) closeSearch(); else openSearch(); return; }
  if(e.key==="Escape"){ if(modalOpen){ closeModal(); } else if(palOpen){ closeSearch(); } return; }
  if(e.key==="/"&&!typing&&!palOpen&&!modalOpen){ e.preventDefault(); openSearch(); return; }
  if(palOpen){
    if(e.key==="ArrowDown"){ e.preventDefault(); palMove(1); }
    else if(e.key==="ArrowUp"){ e.preventDefault(); palMove(-1); }
    else if(e.key==="Enter"){ e.preventDefault(); palEnter(); }
    return;
  }
  if((e.key==="Enter"||e.key===" ")&&e.target&&e.target.hasAttribute&&e.target.hasAttribute("data-open")){ e.preventDefault(); openResource(e.target.getAttribute("data-open")); }
});
window.addEventListener("hashchange",route);
window.addEventListener("scroll",function(){ var n=$("#nav"); if(n) n.classList.toggle("scrolled", window.scrollY>8); },{passive:true});

/* ===================== INIT ===================== */
applyTheme(); applyLang(); paintIcons();
$("#pal-search").addEventListener("input",function(e){ runSearch(e.target.value); });
$("#palette-overlay").addEventListener("mousemove",function(e){ var it=e.target.closest(".pal-item"); if(it){ var i=parseInt(it.getAttribute("data-i"),10); if(i!==palSel){ palSel=i; $$(".pal-item").forEach(function(el){ el.classList.toggle("sel", parseInt(el.getAttribute("data-i"),10)===palSel); }); } } });
route();
</script>
